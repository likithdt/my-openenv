# OpenEnv Environment Manifest
name: data-integrity-lab
version: "0.1.0"
description: "A real-world environment for training agents to clean and format datasets using Pandas."
entrypoint: "server.app:main"
env_type: "docker"

# This tells the validator where to find your Pydantic models
models:
  action: "models:CleanAction"
  observation: "models:DataObservation"
  state: "models:DataState"

# Metadata for the Hackathon
repo: "https://github.com/likith-dt/my-openenv" # You can update this later
license: "MIT"
