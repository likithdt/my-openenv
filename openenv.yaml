name: "my-env"
version: "2.0.0"
description: "A real-world environment for training agents to clean and audit datasets using RL and LLM-based tools."
entrypoint: "server.app:main"
env_type: "docker"
web_interface: true

models:
  action: "server.models:CleanAction"
  observation: "server.models:DataObservation"
  state: "server.models:DataState"

tasks:
  - id: "easy"
    description: "Remove row redundancy (duplicates) from a small controlled dataset."
    difficulty: "easy"
    expected_score: 0.99
  - id: "medium"
    description: "Handle missing values (NaNs) in a dataset."
    difficulty: "medium"
    expected_score: 0.99
  - id: "hard"
    description: "Multi-step cleaning of a messy, mixed dataset."
    difficulty: "hard"
    expected_score: 0.99

repo: "https://github.com/likith-dt/my-openenv" 
license: "MIT"
tags: ["data-cleaning", "data-science", "automation", "rl-environment"]